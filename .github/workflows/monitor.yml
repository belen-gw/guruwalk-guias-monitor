name: Monitorizacion Regulacion Guias Turisticos

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:

  detectar:
    name: "1. Detectar cambios"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: regulacion-guias-monitor

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Detectar cambios en fuentes oficiales
        run: python monitor.py --detect-only

      - name: Debug - listar archivos generados
        run: |
          echo "=== Directorio actual ==="
          pwd
          echo "=== Archivos en directorio actual ==="
          ls -la
          echo "=== Archivos en raíz del repo ==="
          ls -la $GITHUB_WORKSPACE

      - name: Guardar snapshots y cambios pendientes en el repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add snapshots.json
          [ -f pending_changes.json ] && git add pending_changes.json || echo "pending_changes.json no encontrado"
          git diff --staged --quiet || git commit -m "chore: snapshots $(date -u +%Y-%m-%d)"
          git push

      - name: Subir pending_changes.json como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pending-changes
          path: regulacion-guias-monitor/pending_changes.json
          retention-days: 1

  enviar-email:
    name: "2. Enviar email (requiere aprobacion)"
    needs: detectar
    runs-on: ubuntu-latest
    environment: aprobacion-email
    defaults:
      run:
        working-directory: regulacion-guias-monitor

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar cambios pendientes
        uses: actions/download-artifact@v4
        with:
          name: pending-changes
          path: regulacion-guias-monitor

      - name: Enviar email (aprobado por Belén)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: python monitor.py --send-pending
